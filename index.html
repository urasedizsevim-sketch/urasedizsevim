<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifreleyici Aracım</title>
    <!-- PyScript Kütüphaneleri -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 15px; margin-right: 5px; cursor: pointer; }
        #sonuc { margin-top: 20px; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Gizli Mesaj Şifreleyici</h2>
    
    <textarea id="metinGirdisi" placeholder="Buraya metni girin..."></textarea>
    <br>
    
    <!-- Butonlara tıklandığında Python fonksiyonları çalışacak -->
    <button py-click="sifrele_tiklandi">Şifrele</button>
    <button py-click="coz_tiklandi">Şifreyi Çöz</button>

    <div id="sonuc"></div>

    <!-- Python dosyalarını HTML'e tanıtıyoruz -->
    <py-config>
        [files]
        "encode.py" = "./encode.py"
        "decode.py" = "./decode.py"
    </py-config>

    <!-- Ana Python Mantığı -->
<script type="py">
        from pyscript import document
        import encode 
        import decode 

        def sifrele_tiklandi(event):
            # HTML'deki metin kutusundan yazıyı alıyoruz
            girdi = document.getElementById("metinGirdisi").value
            
            # Yazdığımız ues_sifrele fonksiyonuna metni gönderiyoruz
            # Fonksiyon bize iki değer döndürüyor: metin ve key
            sifreli_metin, anahtar = encode.ues_sifrele(girdi)
            
            # Sonucu HTML'de gösterecek şekilde formatlıyoruz
            cikis_metni = f"UESLocker: {sifreli_metin} <br><br> UESLocker(key): {anahtar}"
            document.getElementById("sonuc").innerHTML = cikis_metni

        def coz_tiklandi(event):
            # Burası şimdilik boş, decode dosyası hazır olunca dolduracağız
            pass
    </script>

</body>
</html>
