<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UESLocker</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9; }
        textarea, input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        textarea { height: 100px; }
        button { padding: 10px 15px; margin-right: 5px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #sonuc { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ccc; word-break: break-all; min-height: 50px;}
    </style>
</head>
<body>

    <h2>UESLocker Şifreleyici</h2>
    
    <textarea id="metinGirdisi" placeholder="Şifrelenecek veya çözülecek metni buraya girin..."></textarea>
    
    <input type="number" id="keyGirdisi" placeholder="Şifre çözerken gereken Key'i buraya girin (Şifrelemede boş bırakın)">
    
    <button py-click="sifrele_tiklandi">Şifrele</button>
    <button py-click="coz_tiklandi">Şifreyi Çöz</button>

    <div id="sonuc">Sonuç burada görünecek...</div>

    <py-config>
        files = ["/encode.py", "/desifre.py"]
    </py-config>

    <script type="py">
        from pyscript import document
        import encode 
        import decode 

        def sifrele_tiklandi(event):
            girdi = document.getElementById("metinGirdisi").value
            
            if not girdi:
                document.getElementById("sonuc").innerHTML = "Lütfen şifrelenecek bir metin girin!"
                return

            sifreli_metin, anahtar = encode.ues_sifrele(girdi)
            cikis_metni = f"<b>UESLocker:</b> {sifreli_metin} <br><br> <b>UESLocker(key):</b> {anahtar}"
            document.getElementById("sonuc").innerHTML = cikis_metni

        def coz_tiklandi(event):
            girdi = document.getElementById("metinGirdisi").value
            anahtar = document.getElementById("keyGirdisi").value
            
            if not girdi or not anahtar:
                document.getElementById("sonuc").innerHTML = "Hata: Şifreyi çözmek için hem metni hem de Key değerini girmelisiniz!"
                return

            # decode.py içindeki fonksiyonu çağırıyoruz
            cozulmus_metin = decode.ues_sifre_coz(girdi, anahtar)
            document.getElementById("sonuc").innerHTML = f"<b>Çözülen Metin:</b> {cozulmus_metin}"
    </script>

</body>
</html>
