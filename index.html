<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3637691137658076"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğa Koleji 5. sınıf ödev cevapları</title>
    <style>
        /* Renk Paleti ve Genel Ayarlar */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        /* PDF'lerin alt alta dizildiği ve sıkışmayı önleyen ana taşıyıcı */
        .pdf-container {
            display: flex;
            flex-direction: column;
            gap: 60px; /* PDF'ler arasındaki boşluk. Sıkışmayı bu engeller. */
            max-width: 900px;
            margin: 0 auto; /* Sayfayı ortalar */
        }

        /* Her bir PDF için oluşturulan kart tasarımı */
        .pdf-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pdf-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Site içinde PDF'i gösteren pencere */
        .pdf-viewer {
            width: 100%;
            height: 700px; /* Mouse tekerleğiyle sayfa kayarken PDF'in rahat okunması için ideal yükseklik */
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #fff; /* Transparan PDF'lerde yazının okunabilmesi için arka plan beyaz */
        }

        /* İndirme Butonu */
        .download-btn {
            align-self: flex-start;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cevaplar</h1>
        <p>Aşağıya kaydırarak belgelere göz atabilir veya indirebilirsin.</p>
        <p>(yazılıya hazırlık döneminden dolayı yazılı çalışmaları vardır!!!)</p>
    </div>

    <div class="pdf-container">

        <div class="pdf-card">
            <div class="pdf-title">Matematik</div>
            
            <iframe class="pdf-viewer" src="pdf-dosyalari/ornek1.pdf"></iframe>
            
            <a class="download-btn" href="pdf-dosyalari/ornek1.pdf" download>
                PDF'i İndir
            </a>
        </div>
        <div class="pdf-card">
            <div class="pdf-title">Fen Bilimleri</div>
            
            <iframe class="pdf-viewer" src="pdf-dosyalari/ornek2.pdf"></iframe>
            
            <a class="download-btn" href="pdf-dosyalari/ornek2.pdf" download>
                PDF'i İndir
            </a>
        </div>
        

    </div>

</body>
</html>
