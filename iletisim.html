<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
            --accent-color: #3b82f6;
            --input-bg: #2d2d2d;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contact-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            border-top: 4px solid var(--accent-color);
        }
        h1 {
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .email-text {
            display: block;
            text-align: center;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            padding: 10px;
            background-color: var(--input-bg);
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: var(--input-bg);
            color: white;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Bana Ulaşın</h1>
        <p>Sitedeki içeriklerle ilgili görüş, öneri veya sorularınız için aşağıdaki formu doldurabilir ya da doğrudan mail atabilirsiniz.</p>
        
        <span class="email-text">📧 urasedizsevim@gmail.com</span>

        <!-- FORMSPREE BAĞLANTISI BURADA -->
        <form action="https://formspree.io/f/xpqgpyor" method="POST">
            <div class="form-group">
                <label for="name">Adınız:</label>
                <input type="text" id="name" name="name" required placeholder="İsminiz...">
            </div>
            <div class="form-group">
                <label for="email">E-posta Adresiniz:</label>
                <input type="email" id="email" name="email" required placeholder="ornek@mail.com">
            </div>
            <div class="form-group">
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" rows="5" required placeholder="Bana ne söylemek istersin?"></textarea>
            </div>
            <button type="submit">Mesajı Gönder 🚀</button>
        </form>

        <a href="index.html" class="back-btn">⬅ Ana Sayfaya Dön</a>
    </div>

</body>
</html>
